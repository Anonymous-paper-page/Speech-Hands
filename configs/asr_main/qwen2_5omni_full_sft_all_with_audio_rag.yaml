### model
model_name_or_path: Qwen/Qwen2.5-Omni-7B
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: configs/deepspeed/ds_z3_config.json

### dataset
# Joint training across all 7 OpenASR benchmarks using Parakeet-TDT-0.6B-v3
# as the external ASR (best avg WER in the paper). To run the same joint
# setup with a different external ASR, swap "-parakeet-" for "-whisper-"
# or "-canary-" in every dataset name below (and register those dataset
# entries in dataset_info.json).
dataset: ami-parakeet-5-best-train-with-audio-v3, gigaspeech-parakeet-5-best-train-with-audio-v3, spgispeech-parakeet-5-best-train-with-audio-v3, tedlium-parakeet-5-best-train-with-audio-v3, voxpopuli-parakeet-5-best-train-with-audio-v3, librispeech-parakeet-5-best-train-with-audio-v3
template: qwen2_omni
cutoff_len: 3072
max_samples: 
overwrite_cache: true
preprocessing_num_workers: 1
dataloader_num_workers: 1

### output
output_dir: saves/qwen2_omni-7b/full/all-rag-with-audio-sharegpt-parakeet-v3
logging_steps: 1
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 4
freeze_vision_tower: true
learning_rate: 1.0e-4
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
fp16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
add_special_tokens: "<internal>, <external>, <rewrite>"